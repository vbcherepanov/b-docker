# ============================================================================
# Memcached Configuration
# Production-proven settings matching BITRIX-DOCKER reference
# Values are overridden by env vars in docker-compose command
# ============================================================================

# Memory allocation in MB (production-proven: 1024MB)
-m 1024

# Max simultaneous connections
-c 1024

# Number of threads (production-proven: 8)
-t 8

# Max item size (Bitrix components can cache large objects)
-I 2m

# Listen address and port
-l 0.0.0.0
-p 11211

# Enable modern optimizations (slab rebalancing, LRU crawler)
-o modern
