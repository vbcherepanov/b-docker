# ============================================================================
# Redis Configuration - AOF Persistence + Unix Socket
# Server: 12 CPU, 64GB RAM | Environment: local
# ============================================================================

# ----------------------------------------------------------------------------
# NETWORK
# ----------------------------------------------------------------------------
# Docker containers need 0.0.0.0, security handled by Docker network isolation
bind 0.0.0.0
protected-mode no
port 6379

# TCP tuning
timeout 0
tcp-keepalive 300
tcp-backlog 65535

# ----------------------------------------------------------------------------
# UNIX SOCKET (~30% performance boost for local connections)
# ----------------------------------------------------------------------------
# PHP connects via socket, external tools (redis-exporter) use TCP as fallback
unixsocket /var/run/redis/redis.sock
unixsocketperm 770

# ----------------------------------------------------------------------------
# MEMORY
# ----------------------------------------------------------------------------
# Overridden by docker-compose command: --maxmemory ${REDIS_MAX_MEMORY}
maxmemory 1gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ----------------------------------------------------------------------------
# AOF PERSISTENCE (protects sessions from being lost on restart)
# ----------------------------------------------------------------------------
appendonly yes
appendfilename "appendonly.aof"

# fsync every second - good balance between performance and durability
# Options: always (safest, slowest), everysec (recommended), no (fastest, risky)
appendfsync everysec

# Allow fsync during rewrite (safer, slight performance impact)
no-appendfsync-on-rewrite no

# Auto rewrite AOF when it grows 100% over last rewrite size
auto-aof-rewrite-percentage 100

# Minimum AOF size to trigger rewrite (avoid rewrites on tiny files)
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup (handle crash recovery gracefully)
aof-load-truncated yes

# Incremental fsync during rewrite to avoid latency spikes
aof-rewrite-incremental-fsync yes

# ----------------------------------------------------------------------------
# RDB PERSISTENCE (disabled - using AOF instead)
# ----------------------------------------------------------------------------
save ""

# ----------------------------------------------------------------------------
# PERFORMANCE
# ----------------------------------------------------------------------------
# Lazy operations - offload memory reclamation to background threads
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Active defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

# ----------------------------------------------------------------------------
# DATA STRUCTURES
# ----------------------------------------------------------------------------
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# ----------------------------------------------------------------------------
# LOGGING
# ----------------------------------------------------------------------------
loglevel notice
logfile ""

# ----------------------------------------------------------------------------
# GENERAL
# ----------------------------------------------------------------------------
databases 16
hz 10
activerehashing yes
