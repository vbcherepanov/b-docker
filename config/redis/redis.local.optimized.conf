# ============================================================================
# REDIS CONFIGURATION FOR BITRIX - LOCAL (OPTIMIZED)
# AOF Persistence + Unix Socket for session protection and performance
# ============================================================================

# Network - Docker containers need 0.0.0.0
# Security handled by Docker network isolation
bind 0.0.0.0
port 6379
protected-mode no

# Unix socket (~30% performance boost for local connections)
# PHP connects via socket, external tools (redis-exporter) use TCP as fallback
unixsocket /var/run/redis/redis.sock
unixsocketperm 777

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# RDB Persistence (disabled for local - AOF is sufficient)
save ""

# AOF Persistence (protects sessions from being lost on restart)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-rewrite-incremental-fsync yes

# Logging
loglevel notice
logfile ""

# Performance
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

timeout 300
tcp-keepalive 300
tcp-backlog 511

# Data structures
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Active defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

# General
databases 16
hz 10
activerehashing yes
