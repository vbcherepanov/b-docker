; ============================================================================
; OPcache Configuration for Bitrix
; Optimized based on official Bitrix env-docker settings
; https://github.com/bitrix-tools/env-docker
; ============================================================================
; NOTE: Dynamic settings (memory, files, revalidate_freq) are generated
;       at container startup in 98-opcache-runtime.ini
; ============================================================================

opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=64
opcache.max_accelerated_files=100000
opcache.max_wasted_percentage=5

; File validation — MUST be 1 for dev, can be 0 for prod
; auto-optimize.sh overrides this based on ENVIRONMENT
opcache.validate_timestamps=1
opcache.revalidate_freq=0

opcache.save_comments=1
opcache.enable_cli=0
opcache.consistency_checks=0
opcache.force_restart_timeout=180

; JIT (PHP 8.0+)
opcache.jit=tracing
opcache.jit_buffer_size=128M
