; ============================================================================
; APCu Configuration for Bitrix
; User-land object cache (shared memory)
; Reference: BITRIX-DOCKER production settings
; ============================================================================

[apcu]
; Enable APCu in FPM (disable in CLI to avoid memory waste)
apc.enabled = 1
apc.enable_cli = 0

; Shared memory size for cache storage
apc.shm_size = 256M
apc.shm_segments = 1

; Entry hint (0 = let APCu decide automatically)
apc.entries_hint = 0

; Garbage collection TTL and cache entry TTL (seconds)
apc.gc_ttl = 7200
apc.ttl = 7200
