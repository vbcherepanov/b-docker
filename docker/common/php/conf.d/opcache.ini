; ============================================================================
; OPcache Configuration for Bitrix
; Optimized based on official Bitrix env-docker settings
; https://github.com/bitrix-tools/env-docker
; ============================================================================
; NOTE: Dynamic settings (memory, files, revalidate_freq) are generated
;       at container startup in 98-opcache-runtime.ini
; ============================================================================

opcache.enable=1

; Comments required for Bitrix annotations and some frameworks
opcache.save_comments=1

; CLI disabled by default (enable for long-running workers)
opcache.enable_cli=0

; Consistency checks disabled for performance
opcache.consistency_checks=0

; Waste threshold (Bitrix official: 1%, we use 5% as balanced)
opcache.max_wasted_percentage=5

; File validation - always enabled, freq set at runtime
opcache.validate_timestamps=1

; Restart timeout
opcache.force_restart_timeout=180

; JIT settings (PHP 8.0+)
; Tracing mode provides best performance for long-running applications
; Reference: BITRIX-DOCKER production-proven configuration
opcache.jit=tracing
opcache.jit_buffer_size=128M
