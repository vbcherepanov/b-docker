# =============================================================================
# CORS Origin Validation Map
# Include this file at http{} level in nginx.conf
#
# Only whitelisted origins receive CORS headers.
# Add project-specific origins to the map below.
#
# Usage in nginx.conf:
#   http {
#       include /etc/nginx/snippets/cors-map.conf;
#       ...
#   }
# =============================================================================

map $http_origin $cors_origin {
    default "";

    # Local development origins
    "~^https?://localhost(:[0-9]+)?$"    $http_origin;
    "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;

    # Project domains — add your allowed origins here:
    # "~^https?://example\.com$"           $http_origin;
    # "~^https?://.*\.example\.com$"       $http_origin;
}
