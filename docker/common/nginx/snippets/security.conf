# =============================================================================
# Security Headers
# =============================================================================
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;
add_header Permissions-Policy "geolocation=(), midi=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), fullscreen=(self), payment=()" always;

server_tokens off;

# =============================================================================
# File Access Protection
# =============================================================================

# Block hidden files (except Bitrix .default, .access.php, and .well-known for ACME/SSL)
location ~ /\.(?!default|access\.php|well-known) {
    deny all;
    access_log off;
    log_not_found off;
}

# Block backup and temp files
location ~* \.(bak|backup|old|orig|swp|~)$ {
    deny all;
    access_log off;
}

# =============================================================================
# Malicious Scanner Protection
# =============================================================================

# Block known malicious scanners only
# NOTE: curl/wget/python/bot/crawler NOT blocked — used by monitoring and legitimate tools
if ($http_user_agent ~* (masscan|nmap|sqlmap|nikto|hydra)) {
    return 403;
}

# NOTE: No $args filtering — breaks Bitrix admin panel, updater, and CMS operations.
# SQL injection and XSS protection is handled at the application level by Bitrix.

# Timeout settings
client_body_timeout 30s;
client_header_timeout 30s;
keepalive_timeout 65s;
send_timeout 30s;
