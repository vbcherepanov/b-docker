# =============================================================================
# CORS FastCGI Hide Headers - Prevent duplicate CORS headers from PHP
# Include this in location blocks that use fastcgi_pass + CORS
#
# When PHP application sets its own CORS headers, nginx add_header
# directives will create duplicates. This snippet hides PHP headers
# so only nginx-controlled CORS headers are sent to the client.
#
# Usage:
#   location ~ \.php$ {
#       include /etc/nginx/snippets/cors.conf;
#       include /etc/nginx/snippets/cors-fastcgi-hide.conf;
#       fastcgi_pass bitrix:9000;
#       ...
#   }
# =============================================================================

fastcgi_hide_header Access-Control-Allow-Origin;
fastcgi_hide_header Access-Control-Allow-Credentials;
fastcgi_hide_header Access-Control-Allow-Methods;
fastcgi_hide_header Access-Control-Allow-Headers;
fastcgi_hide_header Access-Control-Expose-Headers;
fastcgi_hide_header Access-Control-Max-Age;
fastcgi_hide_header Vary;
