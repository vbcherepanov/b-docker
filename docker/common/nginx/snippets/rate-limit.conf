# =============================================================================
# Rate Limiting Zones (included in http {} block via nginx.conf)
# =============================================================================
# Usage: limit_req directives are applied in bitrix.conf location blocks

# Auth/admin endpoints: 5 requests per minute per IP
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# API endpoints: 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# General pages: 10 requests per second per IP (enough for users, blocks aggressive bots)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
