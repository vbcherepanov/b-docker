# ============================================================================
# S3-COMPATIBLE PROVIDERS PROXY
# ============================================================================
# This snippet is included inside /upload/bx_cloud_upload/ location block
# in bitrix.conf. Each location handles a specific S3-compatible provider.
#
# URL format from Bitrix: /upload/bx_cloud_upload/SCHEME.HOST/PATH
# Example: /upload/bx_cloud_upload/https.mybucket.storage.yandexcloud.net/file.jpg
#
# To add a new provider:
#   1. Add a location block matching the endpoint hostname pattern
#   2. Set internal; and resolver
#   3. Proxy to the actual S3 URL
#
# Common S3-compatible endpoints:
#   Yandex Cloud:  storage.yandexcloud.net
#   Selectel:      s3.storage.selcloud.ru, s3.selcdn.ru
#   VK Cloud:      hb.bizmrg.com, hb.vkcs.cloud
#   Mail.ru Cloud: hb.bizmrg.com
#   MinIO:         custom hostname (on-premise)
# ============================================================================

# --- Yandex Cloud Object Storage ---
# Endpoint: storage.yandexcloud.net
location ~ ^/upload/bx_cloud_upload/(http[s]?)\.([^/:]+\.storage\.yandexcloud\.net)/(.+)$ {
    internal;
    resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=60s ipv6=off;
    proxy_method GET;
    proxy_set_header Host $2;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Server $host;
    proxy_max_temp_file_size 0;
    proxy_buffering off;
    proxy_intercept_errors off;
    proxy_pass $1://$2/$3;
}

# --- Selectel Object Storage ---
# Endpoints: s3.storage.selcloud.ru, s3.selcdn.ru
location ~ ^/upload/bx_cloud_upload/(http[s]?)\.([^/:]+\.(?:s3\.storage\.selcloud\.ru|s3\.selcdn\.ru|selcdn\.ru))/(.+)$ {
    internal;
    resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=60s ipv6=off;
    proxy_method GET;
    proxy_set_header Host $2;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Server $host;
    proxy_max_temp_file_size 0;
    proxy_buffering off;
    proxy_intercept_errors off;
    proxy_pass $1://$2/$3;
}

# --- VK Cloud / Mail.ru Cloud Solutions ---
# Endpoints: hb.bizmrg.com, hb.vkcs.cloud
location ~ ^/upload/bx_cloud_upload/(http[s]?)\.([^/:]+\.(?:hb\.bizmrg\.com|hb\.vkcs\.cloud))/(.+)$ {
    internal;
    resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=60s ipv6=off;
    proxy_method GET;
    proxy_set_header Host $2;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Server $host;
    proxy_max_temp_file_size 0;
    proxy_buffering off;
    proxy_intercept_errors off;
    proxy_pass $1://$2/$3;
}

# --- Generic S3-compatible provider (catch-all) ---
# Handles any S3-compatible endpoint not matched above.
# URL format: /upload/bx_cloud_upload/SCHEME.HOSTNAME/PATH
# This block is intentionally broad - it matches any hostname.
# It MUST be the LAST location block before the deny-all rule.
#
# SECURITY: This is safe because:
#   1. The parent location is marked internal (only PHP can trigger it)
#   2. Bitrix validates the cloud storage URL before generating the redirect
#   3. Direct browser requests to /upload/bx_cloud_upload/ are denied
location ~ ^/upload/bx_cloud_upload/(http[s]?)\.([^/:]+)/(.+)$ {
    internal;
    resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=60s ipv6=off;
    proxy_method GET;
    proxy_set_header Host $2;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Server $host;
    proxy_max_temp_file_size 0;
    proxy_buffering off;
    proxy_intercept_errors off;
    proxy_pass $1://$2/$3;
}
