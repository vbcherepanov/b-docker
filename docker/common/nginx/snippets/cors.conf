# =============================================================================
# CORS Headers - Reusable snippet for cross-origin API requests
# Include this file in any location block that needs CORS support
#
# REQUIRES: cors-map.conf included at http{} level in nginx.conf
#           (defines $cors_origin variable via origin validation map)
#
# Features:
#   - Validates Origin against whitelist (cors-map.conf)
#   - Supports credentials (cookies, Authorization header)
#   - Handles OPTIONS preflight requests with 204 response
#   - Exposes common response headers to JavaScript
#   - Caches preflight for 24 hours
#
# Security:
#   - Only whitelisted origins receive Access-Control-Allow-Origin
#   - Unknown origins get empty header value (browser rejects the request)
#   - Explicit header whitelist instead of mirroring client request
#
# Usage:
#   location ^~ /api/ {
#       include /etc/nginx/snippets/cors.conf;
#       try_files $uri $uri/ @bitrix;
#   }
#
# Note: When used with fastcgi_pass, add fastcgi_hide_header directives
# to prevent duplicate headers from PHP. See cors-fastcgi-hide.conf.
# =============================================================================

# Validated origin from whitelist (empty string for unknown origins = browser blocks)
add_header Access-Control-Allow-Origin $cors_origin always;
add_header Access-Control-Allow-Credentials true always;

# Allowed HTTP methods
add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

# Explicit list of allowed headers (do not mirror arbitrary client headers)
add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-CSRF-Token, Accept, Origin" always;

# Headers exposed to JavaScript (add more as needed)
add_header Access-Control-Expose-Headers "Content-Disposition, X-Total-Count" always;

# Cache preflight response for 24 hours
add_header Access-Control-Max-Age 86400 always;

# Required for correct caching when Origin varies
add_header Vary "Origin" always;

# Handle preflight OPTIONS requests without passing to backend
if ($request_method = OPTIONS) {
    return 204;
}
