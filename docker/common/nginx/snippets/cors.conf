# =============================================================================
# CORS Headers - Reusable snippet for cross-origin API requests
# Include this file in any location block that needs CORS support
#
# Features:
#   - Supports credentials (cookies, Authorization header)
#   - Handles OPTIONS preflight requests with 204 response
#   - Mirrors request Origin for Allow-Origin (required with credentials)
#   - Exposes common response headers to JavaScript
#   - Caches preflight for 24 hours
#
# Usage:
#   location ^~ /api/ {
#       include /etc/nginx/snippets/cors.conf;
#       try_files $uri $uri/ @bitrix;
#   }
#
# Note: When used with fastcgi_pass, add fastcgi_hide_header directives
# to prevent duplicate headers from PHP. See cors-fastcgi-hide.conf.
# =============================================================================

# Mirror the request Origin (required when Allow-Credentials is true)
# To restrict origins, use a map{} block in http{} context instead
add_header Access-Control-Allow-Origin $http_origin always;
add_header Access-Control-Allow-Credentials true always;

# Allowed HTTP methods
add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

# Mirror requested headers (flexible for any client framework)
add_header Access-Control-Allow-Headers $http_access_control_request_headers always;

# Headers exposed to JavaScript (add more as needed)
add_header Access-Control-Expose-Headers "Content-Disposition, X-Total-Count" always;

# Cache preflight response for 24 hours
add_header Access-Control-Max-Age 86400 always;

# Required for correct caching when Origin varies
add_header Vary "Origin" always;

# Handle preflight OPTIONS requests without passing to backend
if ($request_method = OPTIONS) {
    return 204;
}
