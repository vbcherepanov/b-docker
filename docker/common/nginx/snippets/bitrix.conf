# ============================================================================
# BITRIX CMS - NGINX CONFIGURATION
# Complete .htaccess equivalent + performance/security optimizations
# ============================================================================

# ============================================================================
# BASIC SETTINGS
# ============================================================================

# Disable directory listing (Options -Indexes)
autoindex off;

# Index files (DirectoryIndex)
index index.php index.html;

# Error handling (ErrorDocument 404)
error_page 404 /404.php;

# SEO: Remove trailing /index.php (301 redirect to clean URL)
if ($request_uri ~* "^(.*/)index\.php$") {
    return 301 $1;
}

# ============================================================================
# URL REWRITE - Main routing logic
# ============================================================================

# CORS-enabled API endpoint
# Handles preflight OPTIONS and adds CORS headers for /api/ paths
# Uses ^~ prefix match to take priority over regex locations
location ^~ /api/ {
    limit_req zone=api burst=10 nodelay;
    limit_req_status 429;
    include /etc/nginx/snippets/cors.conf;

    # PHP files in /api/ must be processed via FastCGI
    location ~ \.php$ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $php_upstream bitrix:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param BX_CACHE_SSL $https if_not_empty;
        include /etc/nginx/snippets/cors.conf;
        include /etc/nginx/snippets/cors-fastcgi-hide.conf;
    }

    try_files $uri $uri/ @bitrix;
}

# Bitrix REST API endpoint
# Separate location for rate-limiting and monitoring
location ^~ /rest/ {
    try_files $uri $uri/ @bitrix;
}

# Main request handler
location / {
    limit_req zone=general burst=20 nodelay;
    limit_req_status 429;
    limit_conn conn_limit_per_ip 20;

    # Equivalent of Apache RewriteCond %{REQUEST_FILENAME} !-f, !-l, !-d
    # try_files automatically checks file/directory existence
    try_files $uri $uri/ @bitrix;
}

# Bitrix routing handler (routing_index.php)
# New Bitrix router — checks /local/routes/ first,
# falls back to urlrewrite.php if route not found.
# NOTE: For Bitrix versions < 22.0 without routing support,
# change to: $document_root/bitrix/urlrewrite.php
location @bitrix {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $php_upstream bitrix:9000;
    fastcgi_pass $php_upstream;
    include fastcgi_params;

    fastcgi_param SCRIPT_FILENAME $document_root/bitrix/modules/main/include/routing_index.php;
    fastcgi_param SCRIPT_NAME /bitrix/modules/main/include/routing_index.php;
    fastcgi_param SERVER_NAME $host;

    # Authorization passthrough for REST API
    fastcgi_param REMOTE_USER $http_authorization;
    fastcgi_param HTTP_AUTHORIZATION $http_authorization;

    # HTTPS and proxy headers (must match \.php$ location)
    fastcgi_param HTTPS $https if_not_empty;
    fastcgi_param X-Forwarded-Proto $http_x_forwarded_proto;
    fastcgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
    fastcgi_param X-Forwarded-Host $host;
    fastcgi_param X-Forwarded-Port $server_port;

    # BX_CACHE_SSL — required for Bitrix composite cache over HTTPS
    # Bitrix checks this variable to generate correct cache file paths for SSL
    fastcgi_param BX_CACHE_SSL $https if_not_empty;

    # CORS headers for requests routed through @bitrix (e.g. /api/)
    # Prevents duplicate headers when PHP sets its own CORS
    include /etc/nginx/snippets/cors.conf;
    include /etc/nginx/snippets/cors-fastcgi-hide.conf;
}

# ============================================================================
# SECURITY - Block PHP execution in upload directory
# ============================================================================

# Block PHP and other executable files in upload directory
# IMPORTANT: This rule MUST be BEFORE location ~ \.php$ to take priority
location ~* /upload/.*\.(php|php3|php4|php5|php6|php7|php8|phtml|pl|asp|aspx|cgi|dll|exe|shtm|shtml|fcg|fcgi|fpl|asmx|pht|py|psp|rb|var)$ {
    types {
        text/plain text/plain php php3 php4 php5 php6 php7 php8 phtml pl asp aspx cgi dll exe ico shtm shtml fcg fcgi fpl asmx pht py psp rb var;
    }
}

# ============================================================================
# PHP PROCESSING
# ============================================================================

# Admin panel PHP handler (MUST be before general \.php$ — first regex match wins)
# NOTE: No rate limiting here — admin is auth-protected, and Bitrix updates
# + 1C exchange (1c_exchange.php) need high request rates
location ~* /bitrix/admin.+\.php$ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    try_files $uri @bitrixadm;
    set $php_upstream bitrix:9000;
    fastcgi_pass $php_upstream;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SERVER_NAME $host;
    fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    fastcgi_param BX_CACHE_SSL $https if_not_empty;
    fastcgi_hide_header X-Powered-By;
}

# Admin 404 fallback handler
location @bitrixadm {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $php_upstream bitrix:9000;
    fastcgi_pass $php_upstream;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/bitrix/admin/404.php;
    fastcgi_param SERVER_NAME $host;
    fastcgi_param HTTP_AUTHORIZATION $http_authorization;
}

# Main PHP handler
location ~ \.php$ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $php_upstream bitrix:9000;
    fastcgi_pass $php_upstream;
    fastcgi_index index.php;

    include fastcgi_params;

    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    fastcgi_param PHP_SELF $fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $document_root;
    fastcgi_param SERVER_NAME $host;

    # HTTPS and proxy headers
    fastcgi_param HTTPS $https if_not_empty;
    fastcgi_param X-Forwarded-Proto $http_x_forwarded_proto;
    fastcgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
    fastcgi_param X-Forwarded-Host $host;
    fastcgi_param X-Forwarded-Port $server_port;

    # HTTP Authorization passthrough for REST API
    fastcgi_param REMOTE_USER $http_authorization;
    fastcgi_param HTTP_AUTHORIZATION $http_authorization;

    # BX_CACHE_SSL — required for Bitrix composite cache over HTTPS
    fastcgi_param BX_CACHE_SSL $https if_not_empty;

    # Response buffers (fix upstream sent too big header)
    fastcgi_buffering on;
    fastcgi_buffers 64 32k;
    fastcgi_buffer_size 64k;
    fastcgi_busy_buffers_size 256k;
    fastcgi_temp_file_write_size 256k;

    # Timeouts for long-running scripts
    fastcgi_read_timeout 300s;
    fastcgi_send_timeout 300s;

    # Hide PHP version
    fastcgi_hide_header X-Powered-By;
}

# ============================================================================
# SECURITY - Block access to system files
# ============================================================================

# Block .htaccess and other Apache hidden files
location ~* /\.ht {
    deny all;
    access_log off;
    log_not_found off;
}

# Block VCS directories
location ~* /\.(svn|hg|git) {
    deny all;
    access_log off;
    log_not_found off;
}

# Block PHP-FPM status/ping endpoints (information leak prevention)
location ~ ^/(status|ping)$ {
    return 404;
    access_log off;
}

# Block .phar files (PHP archive exploitation prevention)
location ~ \.phar$ {
    deny all;
    access_log off;
}

# Block Bitrix system directories
# IMPORTANT: ^~ takes priority over regex locations (including location ~ \.php$)
location ^~ /bitrix/modules {
    deny all;
    access_log off;
    log_not_found off;
}

location ^~ /bitrix/local_cache {
    deny all;
    access_log off;
    log_not_found off;
}

location ^~ /bitrix/stack_cache {
    deny all;
    access_log off;
    log_not_found off;
}

location ^~ /bitrix/managed_cache {
    deny all;
    access_log off;
    log_not_found off;
}

location ^~ /bitrix/php_interface {
    deny all;
    access_log off;
    log_not_found off;
}

# Block 1C exchange directories
location ~* ^/upload/1c_[^/]+/ {
    deny all;
    access_log off;
}

# Block parent directory traversal
location ~* /\.\./ {
    deny all;
    access_log off;
}

# Block composite cache config files
location ~* ^/bitrix/html_pages/\.config\.php {
    deny all;
    access_log off;
}

location ~* ^/bitrix/html_pages/\.enabled {
    deny all;
    access_log off;
}

# Block PHP files in cache directory (CSS/JS remain accessible below)
location ~* ^/bitrix/cache/.*\.php$ {
    deny all;
    access_log off;
}

# ============================================================================
# UPLOAD DIRECTORY - Fast 404 for missing files
# Prevents PHP processing for missing images/files in /upload/
# Without this rule, 404 on /upload/ goes through PHP (40-50s per request)
#
# IMPORTANT: /upload/resize_cache/ is EXCLUDED — Bitrix generates resized
# images on-the-fly via PHP when cache file doesn't exist yet.
# See: https://github.com/bitrix-tools/env-docker (static.conf, clouds.conf)
# ============================================================================

location ~* ^/upload/(?!resize_cache/) {
    expires 30d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
    access_log off;
    log_not_found off;
}

# ============================================================================
# STATIC FILE CACHING
# Equivalent of ExpiresByType from .htaccess
# ============================================================================

# Images (access plus 3 day)
location ~* \.(jpg|jpeg|gif|png|webp|svg|ico)$ {
    expires 3d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
    error_page 404 /404.php;
}

# CSS and JavaScript (access plus 3 day)
location ~* \.(css|js)$ {
    expires 3d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
    error_page 404 /404.php;
}

# Fonts
location ~* \.(ttf|ttc|otf|eot|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
}

# Media files
location ~* \.(mp4|mp3|ogg|ogv|webm|flv|swf)$ {
    expires 30d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
}

# Bitrix CSS/JS from cache directory (MUST be before /bitrix/cache/ deny)
location ~* ^/bitrix/cache/(css/.+\.css|js/.+\.js)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    error_page 404 /404.php;
}

# Block all other /bitrix/cache/ access (after CSS/JS exception above)
# Regex locations are evaluated in declaration order — first match wins
location ~* ^/bitrix/cache/ {
    deny all;
    access_log off;
}

# Cache upload, bitrix/images, bitrix/tmp
location ~* ^/(upload|bitrix/images|bitrix/tmp) {
    expires 30d;
    add_header Cache-Control "public";
    add_header X-Content-Type-Options "nosniff" always;
}

# ============================================================================
# BITRIX COMPOSITE CACHE
# ============================================================================

# Serve composite cache HTML files (created by Bitrix composite technology)
# These files are served directly by nginx without PHP — huge performance gain
location ~* @.*\.html$ {
    internal;
    expires -1y;
    add_header X-Bitrix-Composite "Nginx (file)";
}

# ============================================================================
# SPECIAL RULES
# ============================================================================

# favicon.ico — suppress logging
location = /favicon.ico {
    log_not_found off;
    access_log off;
    expires 30d;
}

# robots.txt — allow all, suppress logging
location = /robots.txt {
    allow all;
    log_not_found off;
    access_log off;
}

# apple-touch-icon — suppress 404 errors (181/day from iOS devices)
location ~* /apple-touch-icon(-\d+x\d+)?(-precomposed)?\.png$ {
    log_not_found off;
    access_log off;
    return 204;
}

# 404.html — internal only (used by error_page directives in static locations)
location = /404.html {
    access_log off;
    internal;
}

# Support ticket attachments — internal only (served via PHP X-Accel-Redirect)
location ^~ /upload/support/not_image {
    internal;
}

# Bitrix media player CORS
# SECURITY: wildcard Access-Control-Allow-Origin removed
# If cross-origin media playback is needed, configure specific domains in Bitrix
location ~* ^/bitrix/components/bitrix/player/mediaplayer/player$ {
    # add_header Access-Control-Allow-Origin $http_origin;
    # add_header Access-Control-Allow-Credentials true;
}

# ============================================================================
# S3 CLOUD STORAGE PROXY (Bitrix cloud upload module)
# ============================================================================
# Bitrix uses /upload/bx_cloud_upload/ as internal proxy for cloud storage.
# PHP generates internal redirect with encoded S3 URL in the path.
# Nginx decodes the URL and proxies the request to the actual S3 endpoint.
#
# Supported providers:
#   - AWS S3 (all regions, including s3.REGION.amazonaws.com format)
#   - S3-compatible (MinIO, Selectel, Yandex Cloud, VK Cloud, etc.)
#
# To add a custom S3-compatible provider, include s3-proxy.conf snippet
# or add a location block matching your endpoint pattern below.
# ============================================================================

location ^~ /upload/bx_cloud_upload/ {

    # --- AWS S3: Legacy format (BUCKET.s3.amazonaws.com) ---
    # Matches: s3, s3-REGION.amazonaws.com (old-style region prefixes)
    location ~ ^/upload/bx_cloud_upload/(http[s]?)\.([^/:]+)\.(s3[a-z0-9-]*)\.amazonaws\.com/(.+)$ {
        internal;
        resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=60s ipv6=off;
        proxy_method GET;
        proxy_set_header Host $2.$3.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Server $host;
        proxy_max_temp_file_size 0;
        proxy_buffering off;
        proxy_intercept_errors off;
        proxy_pass $1://$2.$3.amazonaws.com/$4;
    }

    # --- AWS S3: New format (s3.REGION.amazonaws.com/BUCKET) ---
    # Matches: s3.eu-central-1.amazonaws.com, s3.us-west-2.amazonaws.com, etc.
    location ~ ^/upload/bx_cloud_upload/(http[s]?)\.(s3\.[a-z0-9-]+\.amazonaws\.com)/(.+)$ {
        internal;
        resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=60s ipv6=off;
        proxy_method GET;
        proxy_set_header Host $2;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Server $host;
        proxy_max_temp_file_size 0;
        proxy_buffering off;
        proxy_intercept_errors off;
        proxy_pass $1://$2/$3;
    }

    # --- S3-compatible: Generic provider support ---
    # Include additional provider configs (MinIO, Selectel, Yandex, etc.)
    include /etc/nginx/snippets/s3-proxy.conf;

    # Deny all other requests to bx_cloud_upload
    location ~* .* {
        deny all;
    }
}

# ============================================================================
# PUSH SERVER - REAL-TIME NOTIFICATIONS
# ============================================================================
# Uses Docker DNS resolver for dynamic upstream resolution
# This prevents nginx from failing if push-server is not running
#
# Architecture:
#   push-sub (8010) - subscription server, clients connect here via WebSocket
#   push-pub (9010) - publishing server, PHP sends events here (internal only)

# WebSocket/Long-polling for Bitrix Push&Pull (subscriptions)
location /bitrix/sub/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $push_sub push-sub:8010;
    proxy_pass http://$push_sub;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_buffering off;
}

location /bitrix/subws/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $push_sub push-sub:8010;
    proxy_pass http://$push_sub;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_buffering off;
}

# Push server publishing endpoint (internal only, PHP sends events here)
location /bitrix/pub/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $push_pub push-pub:9010;
    proxy_pass http://$push_pub;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Restrict to internal Docker network only
    allow 172.20.0.0/16;
    deny all;
}

# Push server stats (internal only)
location /server-stat/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $push_sub push-sub:8010;
    proxy_pass http://$push_sub;
    allow 127.0.0.1;
    allow 172.20.0.0/16;
    deny all;
}

# ============================================================================
# HEALTH CHECK
# ============================================================================

include /etc/nginx/snippets/health.conf;
